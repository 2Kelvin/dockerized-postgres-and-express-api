services:
  postgres_db:
    image: postgres:18.3
    environment:
      - POSTGRES_USER=user1
      - POSTGRES_PASSWORD=pazword
      - POSTGRES_DB=time_connected
    expose:
      - 5432

  express_api:
    depends_on:
      - postgres_db
    build: ./
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=postgres_db
      - DB_USER=user1
      - DB_NAME=time_connected
      - DB_PORT=5432
      - DB_PASSWORD=pazword